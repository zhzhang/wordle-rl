    { name = "torch" },
    { name = "transformers" },
]

[package.metadata]
requires-dist = [
    { name = "accelerate", specifier = ">=1.13.0" },
    { name = "torch", specifier = ">=2.11.0,<2.12", index = "https://download.pytorch.org/whl/cu128" },
    { name = "transformers", specifier = ">=5.8.1" },
]
